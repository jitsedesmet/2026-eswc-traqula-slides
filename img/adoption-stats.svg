<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 290" font-family="'Open Sans', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="290" fill="#f6fdf5" rx="10"/>

  <!-- ── Comunica Integration (left hero) ─────────────── -->
  <rect x="18" y="18" width="310" height="254" rx="12" fill="white" stroke="#1a4e66" stroke-width="2"/>
  <rect x="18" y="18" width="310" height="68" rx="12" fill="#1a4e66"/>
  <rect x="18" y="68" width="310" height="18" fill="#1a4e66"/>
  <!-- Comunica wordmark area -->
  <text x="173" y="55" text-anchor="middle" font-size="20" fill="white" font-weight="bold">Comunica</text>
  <text x="173" y="75" font-size="11" fill="white" text-anchor="middle">SPARQL Query Engine</text>
  <!-- Integration detail -->
  <text x="173" y="118" text-anchor="middle" font-size="14" fill="#1a4e66" font-weight="bold">Production Integration</text>
  <line x1="38" y1="128" x2="308" y2="128" stroke="#e0e8f0" stroke-width="1.5"/>
  <text x="173" y="152" text-anchor="middle" font-size="12" fill="#267499">Traqula replaces</text>
  <text x="173" y="168" text-anchor="middle" font-size="12" fill="#267499">SPARQL.js + SPARQLAlgebra.js</text>
  <text x="173" y="184" text-anchor="middle" font-size="12" fill="#267499">in the widely-used</text>
  <text x="173" y="200" text-anchor="middle" font-size="12" fill="#267499">Comunica query engine</text>
  <!-- Badge -->
  <rect x="50" y="218" width="222" height="36" rx="8" fill="#e8f7ee" stroke="#2a9d5c" stroke-width="1.5"/>
  <text x="161" y="241" text-anchor="middle" font-size="13" fill="#2a9d5c" font-weight="bold">✓ Mature · In active use</text>

  <!-- ── Stats grid (right) ─────────────────────────── -->
  <!-- Stat 1: Tests -->
  <rect x="348" y="18" width="248" height="116" rx="12" fill="white" stroke="#2a9d5c" stroke-width="2"/>
  <rect x="348" y="18" width="248" height="50" rx="12" fill="#2a9d5c"/>
  <rect x="348" y="52" width="248" height="16" fill="#2a9d5c"/>
  <text x="472" y="50" text-anchor="middle" font-size="28" fill="white" font-weight="bold">6,269</text>
  <text x="472" y="64" text-anchor="middle" font-size="11" fill="white">integration tests</text>
  <text x="472" y="96" text-anchor="middle" font-size="12" fill="#267499">Includes tests from</text>
  <text x="472" y="114" text-anchor="middle" font-size="12" fill="#267499">SPARQL.js &amp; SPARQLAlgebra.js</text>

  <!-- Stat 2: Coverage -->
  <rect x="616" y="18" width="266" height="116" rx="12" fill="white" stroke="#267499" stroke-width="2"/>
  <rect x="616" y="18" width="266" height="50" rx="12" fill="#267499"/>
  <rect x="616" y="52" width="266" height="16" fill="#267499"/>
  <text x="749" y="50" text-anchor="middle" font-size="28" fill="white" font-weight="bold">94%</text>
  <text x="749" y="64" text-anchor="middle" font-size="11" fill="white">line coverage</text>
  <text x="749" y="96" text-anchor="middle" font-size="12" fill="#267499">Committed to growing</text>
  <text x="749" y="114" text-anchor="middle" font-size="12" fill="#267499">toward 100%</text>

  <!-- Stat 3: License -->
  <rect x="348" y="154" width="248" height="118" rx="12" fill="white" stroke="#e26c22" stroke-width="2"/>
  <rect x="348" y="154" width="248" height="50" rx="12" fill="#e26c22"/>
  <rect x="348" y="188" width="248" height="16" fill="#e26c22"/>
  <text x="472" y="186" text-anchor="middle" font-size="28" fill="white" font-weight="bold">MIT</text>
  <text x="472" y="200" text-anchor="middle" font-size="11" fill="white">open-source license</text>
  <text x="472" y="226" text-anchor="middle" font-size="12" fill="#267499">GitHub · npm</text>
  <text x="472" y="245" text-anchor="middle" font-size="12" fill="#267499">github.com/comunica/traqula</text>

  <!-- Stat 4: Sustainability -->
  <rect x="616" y="154" width="266" height="118" rx="12" fill="white" stroke="#1a4e66" stroke-width="2"/>
  <rect x="616" y="154" width="266" height="50" rx="12" fill="#1a4e66"/>
  <rect x="616" y="188" width="266" height="16" fill="#1a4e66"/>
  <text x="749" y="178" text-anchor="middle" font-size="16" fill="white" font-weight="bold">Comunica</text>
  <text x="749" y="196" text-anchor="middle" font-size="11" fill="white">Association Maintenance</text>
  <text x="749" y="220" text-anchor="middle" font-size="12" fill="#267499">Distributed responsibility</text>
  <text x="749" y="238" text-anchor="middle" font-size="12" fill="#267499">Long-term sustainability</text>
  <text x="749" y="256" text-anchor="middle" font-size="11" fill="#1a4e66" font-style="italic">Bounty system for features</text>
</svg>
