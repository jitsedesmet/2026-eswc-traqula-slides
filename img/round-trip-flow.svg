<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Open Sans', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="300" fill="#f6fdf5" rx="10"/>

  <!-- ── Stage labels (top) ───────────────────────────── -->
  <text x="88"  y="22" text-anchor="middle" font-size="11" fill="#267499" font-weight="bold">① Input</text>
  <text x="280" y="22" text-anchor="middle" font-size="11" fill="#267499" font-weight="bold">② Parse</text>
  <text x="462" y="22" text-anchor="middle" font-size="11" fill="#267499" font-weight="bold">③ Transform AST</text>
  <text x="660" y="22" text-anchor="middle" font-size="11" fill="#267499" font-weight="bold">④ Generate</text>
  <text x="836" y="22" text-anchor="middle" font-size="11" fill="#267499" font-weight="bold">⑤ Output</text>

  <!-- ── Input query string box ──────────────────────── -->
  <rect x="18" y="32" width="140" height="84" rx="8" fill="white" stroke="#1a4e66" stroke-width="2"/>
  <text x="88" y="56" text-anchor="middle" font-size="12" fill="#1a4e66" font-weight="bold">Query String</text>
  <text x="88" y="76" text-anchor="middle" font-size="10.5" fill="#1a4e66" font-family="monospace">SelECT * {</text>
  <text x="88" y="91" text-anchor="middle" font-size="10.5" fill="#1a4e66" font-family="monospace">  ?s   ?p ?o</text>
  <text x="88" y="106" text-anchor="middle" font-size="10.5" fill="#1a4e66" font-family="monospace">}</text>

  <!-- Arrow → Parse -->
  <line x1="158" y1="74" x2="208" y2="74" stroke="#1a4e66" stroke-width="2"/>
  <polygon points="204,69 216,74 204,79" fill="#1a4e66"/>

  <!-- ── Parser box ──────────────────────────────────── -->
  <rect x="216" y="52" width="128" height="44" rx="8" fill="#1a4e66"/>
  <text x="280" y="74" text-anchor="middle" font-size="13" fill="white">Parse</text>
  <text x="280" y="89" text-anchor="middle" font-size="9" fill="#7ec8e3">records source positions</text>

  <!-- Arrow → AST -->
  <line x1="344" y1="74" x2="376" y2="74" stroke="#1a4e66" stroke-width="2"/>
  <polygon points="372,69 384,74 372,79" fill="#1a4e66"/>

  <!-- ── AST with source info ────────────────────────── -->
  <rect x="384" y="32" width="154" height="84" rx="8" fill="#e8f7ee" stroke="#2a9d5c" stroke-width="2"/>
  <text x="461" y="52" text-anchor="middle" font-size="12" fill="#1a4e66" font-weight="bold">AST node</text>
  <!-- AST fields -->
  <text x="396" y="70" font-size="10" fill="#267499">type: "variable"</text>
  <text x="396" y="84" font-size="10" fill="#267499">name: "s"</text>
  <text x="396" y="98" font-size="10" fill="#2a9d5c" font-weight="bold">offset: [12, 14]</text>
  <text x="396" y="111" font-size="9" fill="#2a9d5c" font-style="italic">← source position</text>
  <!-- Rename operation arrow (within AST) -->
  <path d="M 461,116 Q 461,134 461,150" stroke="#e26c22" stroke-width="2" fill="none"/>
  <polygon points="456,146 461,158 466,146" fill="#e26c22"/>
  <rect x="390" y="158" width="142" height="28" rx="6" fill="#fff0e0" stroke="#e26c22" stroke-width="1.5"/>
  <text x="461" y="177" text-anchor="middle" font-size="11" fill="#e26c22">rename ?s → ?subject</text>

  <!-- Arrow → Generate -->
  <line x1="538" y1="74" x2="582" y2="74" stroke="#1a4e66" stroke-width="2"/>
  <polygon points="578,69 590,74 578,79" fill="#1a4e66"/>

  <!-- ── Generator box ───────────────────────────────── -->
  <rect x="590" y="52" width="128" height="44" rx="8" fill="#1a4e66"/>
  <text x="654" y="74" text-anchor="middle" font-size="13" fill="white">Generate</text>
  <text x="654" y="89" text-anchor="middle" font-size="9" fill="#7ec8e3">replaces only changed node</text>

  <!-- Arrow → Output -->
  <line x1="718" y1="74" x2="754" y2="74" stroke="#1a4e66" stroke-width="2"/>
  <polygon points="750,69 762,74 750,79" fill="#1a4e66"/>

  <!-- ── Output query string box ─────────────────────── -->
  <rect x="762" y="32" width="120" height="84" rx="8" fill="white" stroke="#1a4e66" stroke-width="2"/>
  <text x="822" y="56" text-anchor="middle" font-size="12" fill="#1a4e66" font-weight="bold">Query String'</text>
  <text x="822" y="76" text-anchor="middle" font-size="10.5" fill="#1a4e66" font-family="monospace">SelECT * {</text>
  <text x="822" y="91" text-anchor="middle" font-size="10.5" fill="#1a4e66" font-family="monospace">  <tspan fill="#e26c22" font-weight="bold">?subject</tspan>   ?p ?o</text>
  <text x="822" y="106" text-anchor="middle" font-size="10.5" fill="#1a4e66" font-family="monospace">}</text>

  <!-- ── Preservation legend (bottom) ───────────────── -->
  <rect x="18" y="205" width="864" height="78" rx="8" fill="white" stroke="#2a9d5c" stroke-width="1.5"/>
  <text x="450" y="226" text-anchor="middle" font-size="12" fill="#1a4e66" font-weight="bold">What is preserved vs. what changes:</text>

  <!-- Green: preserved -->
  <rect x="40" y="238" width="14" height="14" rx="3" fill="#2a9d5c"/>
  <text x="62" y="250" font-size="11" fill="#2a9d5c" font-weight="bold">Preserved (source-identical):</text>
  <text x="266" y="250" font-size="11" fill="#1a4e66">keyword casing </text>
  <text x="346" y="250" font-size="11" fill="#1a4e66" font-family="monospace">SelECT</text>
  <text x="398" y="250" font-size="11" fill="#1a4e66">, extra spacing </text>
  <text x="484" y="250" font-size="11" fill="#1a4e66" font-family="monospace">?p   ?o</text>
  <text x="536" y="250" font-size="11" fill="#1a4e66">, comments, punctuation</text>

  <!-- Orange: changed -->
  <rect x="40" y="260" width="14" height="14" rx="3" fill="#e26c22"/>
  <text x="62" y="272" font-size="11" fill="#e26c22" font-weight="bold">Changed (intentional):</text>
  <text x="220" y="272" font-size="11" fill="#1a4e66">variable name </text>
  <text x="293" y="272" font-size="11" fill="#e26c22" font-family="monospace" font-weight="bold">?s → ?subject</text>
  <text x="420" y="272" font-size="11" fill="#1a4e66"> — only the patched AST node is regenerated</text>
</svg>
