<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 270" font-family="'Open Sans', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="270" fill="#f6fdf5" rx="10"/>

  <!-- ── Card 1: Flexibility ─────────────────────────────── -->
  <rect x="18" y="18" width="200" height="234" rx="12" fill="white" stroke="#1a4e66" stroke-width="2"/>
  <!-- Icon area -->
  <rect x="18" y="18" width="200" height="68" rx="12" fill="#1a4e66"/>
  <rect x="18" y="68" width="200" height="18" fill="#1a4e66"/>
  <!-- Module block icons -->
  <rect x="60" y="30" width="28" height="22" rx="4" fill="white" opacity="0.85"/>
  <rect x="95" y="30" width="28" height="22" rx="4" fill="#e26c22" opacity="0.9"/>
  <rect x="130" y="30" width="28" height="22" rx="4" fill="white" opacity="0.85"/>
  <text x="74" y="46" text-anchor="middle" font-size="10" fill="#1a4e66">A</text>
  <text x="109" y="46" text-anchor="middle" font-size="10" fill="white" font-weight="bold">B'</text>
  <text x="144" y="46" text-anchor="middle" font-size="10" fill="#1a4e66">C</text>
  <text x="118" y="74" font-size="11" fill="white" text-anchor="middle">+ add · − remove · ~ patch</text>
  <!-- Title -->
  <text x="118" y="112" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a4e66">Flexibility</text>
  <line x1="38" y1="122" x2="198" y2="122" stroke="#e0e8f0" stroke-width="1.5"/>
  <!-- Description -->
  <text x="118" y="146" text-anchor="middle" font-size="12" fill="#267499">Compose parsers,</text>
  <text x="118" y="164" text-anchor="middle" font-size="12" fill="#267499">generators &amp; transformers</text>
  <text x="118" y="182" text-anchor="middle" font-size="12" fill="#267499">from small, reusable</text>
  <text x="118" y="200" text-anchor="middle" font-size="12" fill="#267499">grammar rule modules</text>
  <text x="118" y="236" text-anchor="middle" font-size="11" fill="#1a4e66" font-style="italic">Experiment with SPARQL</text>

  <!-- ── Card 2: Round-tripping ──────────────────────────── -->
  <rect x="237" y="18" width="200" height="234" rx="12" fill="white" stroke="#267499" stroke-width="2"/>
  <rect x="237" y="18" width="200" height="68" rx="12" fill="#267499"/>
  <rect x="237" y="68" width="200" height="18" fill="#267499"/>
  <!-- Cycle arrow icon -->
  <path d="M337,25 a22,22 0 1,1 -0.1,0 Z" fill="none" stroke="white" stroke-width="2.5" stroke-dasharray="80,20"/>
  <polygon points="315,36 310,43 320,42" fill="white"/>
  <!-- Label inside arrow -->
  <text x="337" y="51" text-anchor="middle" font-size="9" fill="white">Parse → Gen</text>
  <text x="337" y="74" font-size="11" fill="white" text-anchor="middle">Source details preserved</text>
  <!-- Title -->
  <text x="337" y="112" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a4e66">Round-tripping</text>
  <line x1="257" y1="122" x2="417" y2="122" stroke="#e0e8f0" stroke-width="1.5"/>
  <text x="337" y="146" text-anchor="middle" font-size="12" fill="#267499">Parse → transform →</text>
  <text x="337" y="164" text-anchor="middle" font-size="12" fill="#267499">regenerate: only the</text>
  <text x="337" y="182" text-anchor="middle" font-size="12" fill="#267499">intentional change</text>
  <text x="337" y="200" text-anchor="middle" font-size="12" fill="#267499">is reflected</text>
  <text x="337" y="236" text-anchor="middle" font-size="11" fill="#1a4e66" font-style="italic">Enables linters &amp; formatters</text>

  <!-- ── Card 3: Web-based ───────────────────────────────── -->
  <rect x="456" y="18" width="200" height="234" rx="12" fill="white" stroke="#e26c22" stroke-width="2"/>
  <rect x="456" y="18" width="200" height="68" rx="12" fill="#e26c22"/>
  <rect x="456" y="68" width="200" height="18" fill="#e26c22"/>
  <!-- Browser icon -->
  <rect x="526" y="25" width="60" height="44" rx="5" fill="none" stroke="white" stroke-width="2"/>
  <line x1="526" y1="38" x2="586" y2="38" stroke="white" stroke-width="1.5"/>
  <circle cx="534" cy="32" r="3" fill="white"/>
  <circle cx="544" cy="32" r="3" fill="white"/>
  <rect x="532" y="43" width="48" height="18" rx="2" fill="white" opacity="0.3"/>
  <text x="556" y="74" font-size="11" fill="white" text-anchor="middle">Browser · Node.js</text>
  <!-- Title -->
  <text x="556" y="112" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a4e66">Web-based</text>
  <line x1="476" y1="122" x2="636" y2="122" stroke="#e0e8f0" stroke-width="1.5"/>
  <text x="556" y="146" text-anchor="middle" font-size="12" fill="#267499">TypeScript</text>
  <text x="556" y="164" text-anchor="middle" font-size="12" fill="#267499">Runs in browsers</text>
  <text x="556" y="182" text-anchor="middle" font-size="12" fill="#267499">and server-side</text>
  <text x="556" y="200" text-anchor="middle" font-size="12" fill="#267499">(Node.js, Bun, Deno)</text>
  <text x="556" y="236" text-anchor="middle" font-size="11" fill="#1a4e66" font-style="italic">Widest developer reach</text>

  <!-- ── Card 4: Language-agnostic ──────────────────────── -->
  <rect x="675" y="18" width="207" height="234" rx="12" fill="white" stroke="#1a4e66" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="675" y="18" width="207" height="68" rx="12" fill="#1a4e66"/>
  <rect x="675" y="68" width="207" height="18" fill="#1a4e66"/>
  <!-- Language tags -->
  <rect x="695" y="27" width="44" height="20" rx="4" fill="white" opacity="0.9"/>
  <text x="717" y="41" text-anchor="middle" font-size="10" fill="#1a4e66" font-weight="bold">SPARQL</text>
  <rect x="746" y="27" width="40" height="20" rx="4" fill="#e26c22" opacity="0.9"/>
  <text x="766" y="41" text-anchor="middle" font-size="10" fill="white">SHACL</text>
  <rect x="693" y="51" width="36" height="20" rx="4" fill="#267499" opacity="0.9"/>
  <text x="711" y="65" text-anchor="middle" font-size="10" fill="white">GQL</text>
  <rect x="736" y="51" width="40" height="20" rx="4" fill="white" opacity="0.7"/>
  <text x="756" y="65" text-anchor="middle" font-size="10" fill="#1a4e66">RML</text>
  <rect x="783" y="51" width="34" height="20" rx="4" fill="#e26c22" opacity="0.7"/>
  <text x="800" y="65" text-anchor="middle" font-size="10" fill="white">SQL</text>
  <text x="779" y="74" font-size="11" fill="white" text-anchor="middle">Generic core, any language</text>
  <!-- Title -->
  <text x="779" y="112" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a4e66">Language-agnostic</text>
  <line x1="695" y1="122" x2="862" y2="122" stroke="#e0e8f0" stroke-width="1.5"/>
  <text x="779" y="146" text-anchor="middle" font-size="12" fill="#267499">Generic core supports</text>
  <text x="779" y="164" text-anchor="middle" font-size="12" fill="#267499">SPARQL, SHACL, GQL</text>
  <text x="779" y="182" text-anchor="middle" font-size="12" fill="#267499">and other languages</text>
  <text x="779" y="200" text-anchor="middle" font-size="12" fill="#267499">without modification</text>
  <text x="779" y="236" text-anchor="middle" font-size="11" fill="#1a4e66" font-style="italic">Reuse across query ecosystems</text>
</svg>
