<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Open Sans', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="320" fill="#f6fdf5" rx="10"/>

  <!-- ── Header row ──────────────────────────────────────── -->
  <rect x="18" y="18" width="864" height="44" rx="8" fill="#1a4e66"/>

  <!-- Column headers -->
  <text x="220" y="46" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Tool</text>
  <text x="408" y="46" text-anchor="middle" font-size="12" fill="white">Flexible</text>
  <text x="513" y="46" text-anchor="middle" font-size="12" fill="white">Round-trip</text>
  <text x="630" y="46" text-anchor="middle" font-size="12" fill="white">Web-native</text>
  <text x="752" y="46" text-anchor="middle" font-size="12" fill="white">Lang-agnostic</text>

  <!-- Column dividers in header -->
  <line x1="360" y1="22" x2="360" y2="58" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="468" y1="22" x2="468" y2="58" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="576" y1="22" x2="576" y2="58" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="690" y1="22" x2="690" y2="58" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- ── Row 1: Apache Jena ──────────────────────────────── -->
  <rect x="18" y="70" width="864" height="48" rx="0" fill="#eef4f8"/>
  <text x="118" y="100" text-anchor="middle" font-size="12" fill="#267499" font-style="italic">Generated (JavaCC)</text>
  <text x="220" y="100" text-anchor="middle" font-size="13" fill="#1a4e66" font-weight="bold">Apache Jena</text>
  <!-- ✗ Flexible -->
  <text x="408" y="100" text-anchor="middle" font-size="22" fill="#cc3333">✗</text>
  <!-- ✗ Round-trip -->
  <text x="513" y="100" text-anchor="middle" font-size="22" fill="#cc3333">✗</text>
  <!-- ✗ Web-native -->
  <text x="630" y="100" text-anchor="middle" font-size="22" fill="#cc3333">✗</text>
  <!-- ✗ Lang-agnostic -->
  <text x="752" y="100" text-anchor="middle" font-size="22" fill="#cc3333">✗</text>

  <!-- ── Row 2: SPARQL.js ─────────────────────────────────── -->
  <rect x="18" y="118" width="864" height="48" rx="0" fill="white"/>
  <text x="118" y="148" text-anchor="middle" font-size="12" fill="#267499" font-style="italic">Generated (Jison)</text>
  <text x="220" y="148" text-anchor="middle" font-size="13" fill="#1a4e66" font-weight="bold">SPARQL.js</text>
  <!-- ✗ Flexible -->
  <text x="408" y="148" text-anchor="middle" font-size="22" fill="#cc3333">✗</text>
  <!-- ✗ Round-trip -->
  <text x="513" y="148" text-anchor="middle" font-size="22" fill="#cc3333">✗</text>
  <!-- ✓ Web-native -->
  <text x="630" y="148" text-anchor="middle" font-size="22" fill="#2a9d5c">✓</text>
  <!-- ✗ Lang-agnostic -->
  <text x="752" y="148" text-anchor="middle" font-size="22" fill="#cc3333">✗</text>

  <!-- ── Row 3: Stardog Millan ────────────────────────────── -->
  <rect x="18" y="166" width="864" height="48" rx="0" fill="#eef4f8"/>
  <text x="118" y="196" text-anchor="middle" font-size="12" fill="#267499" font-style="italic">Toolkit (Chevrotain)</text>
  <text x="220" y="196" text-anchor="middle" font-size="13" fill="#1a4e66" font-weight="bold">Stardog Millan</text>
  <!-- ~ Flexible (partial) -->
  <text x="408" y="196" text-anchor="middle" font-size="20" fill="#e26c22">~</text>
  <!-- ✗ Round-trip -->
  <text x="513" y="196" text-anchor="middle" font-size="22" fill="#cc3333">✗</text>
  <!-- ✓ Web-native -->
  <text x="630" y="196" text-anchor="middle" font-size="22" fill="#2a9d5c">✓</text>
  <!-- ✗ Lang-agnostic -->
  <text x="752" y="196" text-anchor="middle" font-size="22" fill="#cc3333">✗</text>

  <!-- ── Row 4: Traqula (highlighted) ───────────────────── -->
  <rect x="18" y="214" width="864" height="52" rx="0" fill="#e8f7ee"/>
  <rect x="18" y="214" width="4" height="52" fill="#2a9d5c"/>
  <text x="118" y="244" text-anchor="middle" font-size="12" fill="#267499" font-style="italic">Toolkit (Chevrotain)</text>
  <text x="220" y="244" text-anchor="middle" font-size="14" fill="#1a4e66" font-weight="bold">Traqula</text>
  <!-- ✓ Flexible -->
  <text x="408" y="244" text-anchor="middle" font-size="22" fill="#2a9d5c">✓</text>
  <!-- ✓ Round-trip -->
  <text x="513" y="244" text-anchor="middle" font-size="22" fill="#2a9d5c">✓</text>
  <!-- ✓ Web-native -->
  <text x="630" y="244" text-anchor="middle" font-size="22" fill="#2a9d5c">✓</text>
  <!-- ✓ Lang-agnostic -->
  <text x="752" y="244" text-anchor="middle" font-size="22" fill="#2a9d5c">✓</text>

  <!-- Bottom border for rows -->
  <rect x="18" y="266" width="864" height="2" fill="#d0dce8"/>

  <!-- Bottom note -->
  <text x="450" y="296" text-anchor="middle" font-size="12" fill="#e26c22" font-weight="bold">13 of 16 popular parsers use generated grammars — none satisfies all four requirements</text>

  <!-- Vertical column dividers for data rows -->
  <line x1="360" y1="70" x2="360" y2="266" stroke="#d0dce8" stroke-width="1"/>
  <line x1="468" y1="70" x2="468" y2="266" stroke="#d0dce8" stroke-width="1"/>
  <line x1="576" y1="70" x2="576" y2="266" stroke="#d0dce8" stroke-width="1"/>
  <line x1="690" y1="70" x2="690" y2="266" stroke="#d0dce8" stroke-width="1"/>

  <!-- Left column sub-divider -->
  <line x1="18" y1="70" x2="18" y2="266" stroke="#d0dce8" stroke-width="0"/>
  <line x1="180" y1="70" x2="180" y2="266" stroke="#d0dce8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="882" y1="70" x2="882" y2="266" stroke="#d0dce8" stroke-width="0"/>

  <!-- Outer border -->
  <rect x="18" y="18" width="864" height="250" rx="8" fill="none" stroke="#1a4e66" stroke-width="1.5"/>
</svg>
