<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Open Sans', Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#1a4e66"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#2a9d5c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#e26c22"/>
    </marker>
    <marker id="arrowGreenR" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 Z" fill="#2a9d5c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="#f6fdf5" rx="10"/>

  <!-- ══ Column 1: Query String (blue) ══════════════════ -->
  <rect x="16" y="16" width="194" height="200" rx="10" fill="white" stroke="#1a4e66" stroke-width="2"/>
  <rect x="16" y="16" width="194" height="44" rx="10" fill="#1a4e66"/>
  <rect x="16" y="46" width="194" height="14" fill="#1a4e66"/>
  <text x="113" y="44" text-anchor="middle" font-size="14" fill="white" font-weight="bold">Query String</text>

  <!-- SPARQL 1.1 example -->
  <text x="32" y="82" font-size="11" fill="#267499" font-weight="bold">SPARQL 1.1</text>
  <rect x="24" y="88" width="178" height="56" rx="5" fill="#dce8f0"/>
  <text x="34" y="106" font-size="10.5" fill="#1a4e66" font-family="monospace">SelECT * {</text>
  <text x="34" y="120" font-size="10.5" fill="#1a4e66" font-family="monospace">  ?s   ?p ?o</text>
  <text x="34" y="134" font-size="10.5" fill="#1a4e66" font-family="monospace">}</text>

  <!-- SPARQL 1.2 example -->
  <text x="32" y="160" font-size="11" fill="#267499" font-weight="bold">SPARQL 1.2</text>
  <rect x="24" y="166" width="178" height="42" rx="5" fill="#dce8f0"/>
  <text x="34" y="184" font-size="10.5" fill="#1a4e66" font-family="monospace">SELECT * {</text>
  <text x="34" y="198" font-size="10.5" fill="#1a4e66" font-family="monospace">  ?s ?p &lt;&lt;?a ?b ?c&gt;&gt;</text>

  <text x="113" y="228" text-anchor="middle" font-size="10" fill="#1a4e66" font-style="italic">Human-readable text</text>

  <!-- ══ Column 2: AST (green) ═══════════════════════════ -->
  <rect x="340" y="16" width="220" height="200" rx="10" fill="white" stroke="#2a9d5c" stroke-width="2"/>
  <rect x="340" y="16" width="220" height="44" rx="10" fill="#2a9d5c"/>
  <rect x="340" y="46" width="220" height="14" fill="#2a9d5c"/>
  <text x="450" y="44" text-anchor="middle" font-size="14" fill="white" font-weight="bold">AST</text>

  <!-- AST tree visual -->
  <text x="356" y="80" font-size="11" fill="#1a4e66" font-weight="bold">SelectQuery</text>
  <!-- Connector lines -->
  <line x1="380" y1="85" x2="380" y2="98" stroke="#2a9d5c" stroke-width="1.5"/>
  <line x1="380" y1="98" x2="368" y2="98" stroke="#2a9d5c" stroke-width="1.5"/>
  <line x1="380" y1="98" x2="430" y2="98" stroke="#2a9d5c" stroke-width="1.5"/>
  <line x1="430" y1="98" x2="430" y2="110" stroke="#2a9d5c" stroke-width="1.5"/>
  <line x1="368" y1="98" x2="368" y2="110" stroke="#2a9d5c" stroke-width="1.5"/>
  <!-- Variable node -->
  <rect x="336" y="108" width="64" height="22" rx="4" fill="#e8f7ee" stroke="#2a9d5c" stroke-width="1"/>
  <text x="368" y="123" text-anchor="middle" font-size="10" fill="#1a4e66">var(?s,?p,?o)</text>
  <!-- Pattern node -->
  <rect x="404" y="108" width="64" height="22" rx="4" fill="#e8f7ee" stroke="#2a9d5c" stroke-width="1"/>
  <text x="436" y="123" text-anchor="middle" font-size="10" fill="#1a4e66">Pattern</text>

  <line x1="436" y1="130" x2="436" y2="142" stroke="#2a9d5c" stroke-width="1.5"/>
  <rect x="404" y="142" width="64" height="22" rx="4" fill="#e8f7ee" stroke="#2a9d5c" stroke-width="1"/>
  <text x="436" y="157" text-anchor="middle" font-size="10" fill="#1a4e66">?s ?p ?o</text>

  <!-- Source offset badge -->
  <rect x="510" y="72" width="40" height="22" rx="4" fill="#fff0e0" stroke="#e26c22" stroke-width="1"/>
  <text x="530" y="87" text-anchor="middle" font-size="9" fill="#e26c22" font-weight="bold">offset</text>
  <line x1="500" y1="83" x2="508" y2="83" stroke="#e26c22" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Source preserving note -->
  <rect x="348" y="175" width="204" height="32" rx="5" fill="#e8f7ee"/>
  <text x="450" y="189" text-anchor="middle" font-size="10" fill="#2a9d5c" font-weight="bold">↺ Source positions stored</text>
  <text x="450" y="202" text-anchor="middle" font-size="10" fill="#2a9d5c">spacing, casing preserved</text>

  <text x="450" y="228" text-anchor="middle" font-size="10" fill="#1a4e66" font-style="italic">Linters · formatters · rewriters</text>

  <!-- ══ Column 3: Algebra (orange) ══════════════════════ -->
  <rect x="690" y="16" width="194" height="200" rx="10" fill="white" stroke="#e26c22" stroke-width="2"/>
  <rect x="690" y="16" width="194" height="44" rx="10" fill="#e26c22"/>
  <rect x="690" y="46" width="194" height="14" fill="#e26c22"/>
  <text x="787" y="44" text-anchor="middle" font-size="14" fill="white" font-weight="bold">Algebra</text>

  <!-- Algebra tree -->
  <text x="706" y="80" font-size="11" fill="#1a4e66" font-weight="bold">Project</text>
  <line x1="722" y1="84" x2="722" y2="97" stroke="#e26c22" stroke-width="1.5"/>
  <rect x="690" y="97" width="64" height="22" rx="4" fill="#fff0e0" stroke="#e26c22" stroke-width="1"/>
  <text x="722" y="112" text-anchor="middle" font-size="10" fill="#1a4e66">[s, p, o]</text>

  <line x1="722" y1="119" x2="722" y2="131" stroke="#e26c22" stroke-width="1.5"/>
  <rect x="690" y="131" width="64" height="22" rx="4" fill="#fff0e0" stroke="#e26c22" stroke-width="1"/>
  <text x="722" y="146" text-anchor="middle" font-size="10" fill="#1a4e66">BGP</text>
  <line x1="722" y1="153" x2="722" y2="165" stroke="#e26c22" stroke-width="1.5"/>
  <rect x="690" y="165" width="64" height="22" rx="4" fill="#fff0e0" stroke="#e26c22" stroke-width="1"/>
  <text x="722" y="180" text-anchor="middle" font-size="10" fill="#1a4e66">s p o</text>

  <!-- No source info badge -->
  <rect x="762" y="97" width="112" height="44" rx="5" fill="#fde8e8" stroke="#cc3333" stroke-width="1"/>
  <text x="818" y="113" text-anchor="middle" font-size="10" fill="#cc3333" font-weight="bold">✗ source info</text>
  <text x="818" y="127" text-anchor="middle" font-size="10" fill="#cc3333">lost on conversion</text>
  <text x="818" y="141" text-anchor="middle" font-size="10" fill="#cc3333">→ canonical form</text>

  <text x="787" y="228" text-anchor="middle" font-size="10" fill="#1a4e66" font-style="italic">Query engines · dialect bridging</text>

  <!-- ══ Arrows between columns ════════════════════════ -->
  <!-- String → AST (parse) -->
  <line x1="213" y1="100" x2="332" y2="100" stroke="#1a4e66" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="230" y="86" width="84" height="20" rx="4" fill="#dce8f0"/>
  <text x="272" y="100" text-anchor="middle" font-size="11" fill="#1a4e66" font-weight="bold">parse →</text>

  <!-- AST → String (generate, round-trip) -->
  <path d="M 340 145 Q 275 160 213 145" fill="none" stroke="#2a9d5c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowGreenR)"/>
  <rect x="226" y="152" width="90" height="20" rx="4" fill="#e8f7ee"/>
  <text x="271" y="166" text-anchor="middle" font-size="10" fill="#2a9d5c" font-weight="bold">↺ generate</text>

  <!-- AST → Algebra -->
  <line x1="563" y1="110" x2="682" y2="110" stroke="#e26c22" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="578" y="96" width="88" height="20" rx="4" fill="#fff0e0"/>
  <text x="622" y="110" text-anchor="middle" font-size="11" fill="#e26c22" font-weight="bold">→ algebra</text>

  <!-- ══ Bottom: Key insight row ════════════════════════ -->
  <rect x="16" y="248" width="868" height="58" rx="8" fill="white" stroke="#1a4e66" stroke-width="1.5"/>

  <!-- AST transform -->
  <rect x="28" y="256" width="280" height="42" rx="6" fill="#e8f7ee"/>
  <text x="38" y="272" font-size="11" fill="#2a9d5c" font-weight="bold">AST-level transform (round-trippable)</text>
  <text x="38" y="288" font-size="10.5" fill="#1a4e66">rename <tspan font-family="monospace" font-weight="bold">?s→?subject</tspan> → only that token changes</text>

  <!-- Algebra transform -->
  <rect x="320" y="256" width="262" height="42" rx="6" fill="#fff0e0"/>
  <text x="330" y="272" font-size="11" fill="#e26c22" font-weight="bold">Algebra-level transform</text>
  <text x="330" y="288" font-size="10.5" fill="#1a4e66">SPARQL 1.1 ↔ SPARQL 1.2 dialect bridging</text>

  <!-- SPARQL support strip -->
  <rect x="596" y="256" width="278" height="42" rx="6" fill="#dce8f0"/>
  <text x="608" y="272" font-size="11" fill="#1a4e66" font-weight="bold">Traqula supports:</text>
  <rect x="608" y="278" width="72" height="16" rx="3" fill="#1a4e66"/>
  <text x="644" y="290" text-anchor="middle" font-size="9.5" fill="white">SPARQL 1.1</text>
  <rect x="688" y="278" width="72" height="16" rx="3" fill="#267499"/>
  <text x="724" y="290" text-anchor="middle" font-size="9.5" fill="white">SPARQL 1.2</text>
  <rect x="768" y="278" width="98" height="16" rx="3" fill="#e26c22"/>
  <text x="817" y="290" text-anchor="middle" font-size="9.5" fill="white">1.1 + ADJUST</text>
</svg>
