<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 290" font-family="'Open Sans', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="290" fill="#f6fdf5" rx="10"/>

  <!-- ── Card 1: Query Evaluation ───────────────────────────── -->
  <rect x="30" y="20" width="262" height="252" rx="12" fill="white" stroke="#1a4e66" stroke-width="2"/>
  <!-- Number badge -->
  <circle cx="60" cy="50" r="22" fill="#1a4e66"/>
  <text x="60" y="56" text-anchor="middle" fill="white" font-size="18" font-weight="bold">1</text>
  <!-- Icon: broken link/chain -->
  <g transform="translate(140,38)">
    <rect x="-28" y="-14" width="22" height="12" rx="4" fill="none" stroke="#1a4e66" stroke-width="2.5"/>
    <rect x="6" y="-14" width="22" height="12" rx="4" fill="none" stroke="#1a4e66" stroke-width="2.5"/>
    <line x1="-6" y1="-8" x2="6" y2="-8" stroke="#e26c22" stroke-width="2" stroke-dasharray="3,2"/>
  </g>
  <!-- Title -->
  <text x="161" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a4e66">Query Evaluation</text>
  <!-- Divider -->
  <line x1="50" y1="110" x2="272" y2="110" stroke="#e0e8f0" stroke-width="1.5"/>
  <!-- Description -->
  <text x="161" y="135" text-anchor="middle" font-size="13" fill="#267499">A SPARQL 1.2 query</text>
  <text x="161" y="153" text-anchor="middle" font-size="13" fill="#267499">may fail on an older</text>
  <text x="161" y="171" text-anchor="middle" font-size="13" fill="#267499">SPARQL endpoint</text>
  <!-- Example box -->
  <rect x="50" y="190" width="222" height="60" rx="6" fill="#fdf0e8" stroke="#e26c22" stroke-width="1"/>
  <text x="161" y="212" text-anchor="middle" font-size="11" fill="#e26c22" font-style="italic">SPARQL 1.2 query</text>
  <text x="161" y="230" text-anchor="middle" font-size="11" fill="#e26c22">→ sent to SPARQL 1.0 endpoint</text>
  <text x="161" y="244" text-anchor="middle" font-size="11" fill="#e26c22" font-weight="bold">→ Error ✗</text>

  <!-- ── Card 2: Tooling ────────────────────────────────────── -->
  <rect x="320" y="20" width="262" height="252" rx="12" fill="white" stroke="#267499" stroke-width="2"/>
  <circle cx="350" cy="50" r="22" fill="#267499"/>
  <text x="350" y="56" text-anchor="middle" fill="white" font-size="18" font-weight="bold">2</text>
  <!-- Icon: wrench -->
  <g transform="translate(430,38)">
    <path d="M-8,-14 Q-14,-14 -14,-8 Q-14,-2 -8,-2 L4,8 Q6,10 8,8 Q10,6 8,4 L-2,-8 Q2,-14 -8,-14 Z" fill="none" stroke="#267499" stroke-width="2.2"/>
    <line x1="4" y1="8" x2="14" y2="14" stroke="#267499" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="451" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a4e66">Tooling</text>
  <line x1="340" y1="110" x2="562" y2="110" stroke="#e0e8f0" stroke-width="1.5"/>
  <text x="451" y="135" text-anchor="middle" font-size="13" fill="#267499">Linters, editors, and</text>
  <text x="451" y="153" text-anchor="middle" font-size="13" fill="#267499">formatters assume a</text>
  <text x="451" y="171" text-anchor="middle" font-size="13" fill="#267499">single SPARQL version</text>
  <rect x="340" y="190" width="222" height="60" rx="6" fill="#fdf0e8" stroke="#e26c22" stroke-width="1"/>
  <text x="451" y="212" text-anchor="middle" font-size="11" fill="#e26c22" font-style="italic">IDE, linter, language server</text>
  <text x="451" y="230" text-anchor="middle" font-size="11" fill="#e26c22">→ built for SPARQL 1.1</text>
  <text x="451" y="244" text-anchor="middle" font-size="11" fill="#e26c22" font-weight="bold">→ breaks on 1.2 syntax ✗</text>

  <!-- ── Card 3: Maintainability ──────────────────────────── -->
  <rect x="610" y="20" width="262" height="252" rx="12" fill="white" stroke="#e26c22" stroke-width="2"/>
  <circle cx="640" cy="50" r="22" fill="#e26c22"/>
  <text x="640" y="56" text-anchor="middle" fill="white" font-size="18" font-weight="bold">3</text>
  <!-- Icon: tangled branches (simplified) -->
  <g transform="translate(720,38)">
    <path d="M-14,-10 C-14,-10 -8,0 0,0 C8,0 14,-10 14,-10" fill="none" stroke="#e26c22" stroke-width="2" stroke-linecap="round"/>
    <path d="M-14,10 C-14,10 -8,0 0,0 C8,0 14,10 14,10" fill="none" stroke="#1a4e66" stroke-width="2" stroke-linecap="round"/>
    <path d="M-14,-10 C-14,-10 -8,0 0,0 C8,0 14,10 14,10" fill="none" stroke="#267499" stroke-width="1.5" stroke-dasharray="3,2" stroke-linecap="round"/>
  </g>
  <text x="741" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a4e66">Maintainability</text>
  <line x1="630" y1="110" x2="852" y2="110" stroke="#e0e8f0" stroke-width="1.5"/>
  <text x="741" y="135" text-anchor="middle" font-size="13" fill="#267499">Multi-version support</text>
  <text x="741" y="153" text-anchor="middle" font-size="13" fill="#267499">leads to messy,</text>
  <text x="741" y="171" text-anchor="middle" font-size="13" fill="#267499">hard-to-maintain code</text>
  <rect x="630" y="190" width="222" height="60" rx="6" fill="#fdf0e8" stroke="#e26c22" stroke-width="1"/>
  <text x="741" y="212" text-anchor="middle" font-size="11" fill="#e26c22" font-style="italic">if SPARQL_1_1 ... else if SPARQL_1_2</text>
  <text x="741" y="230" text-anchor="middle" font-size="11" fill="#e26c22">→ duplicated logic</text>
  <text x="741" y="244" text-anchor="middle" font-size="11" fill="#e26c22" font-weight="bold">→ fragile codebase ✗</text>
</svg>
