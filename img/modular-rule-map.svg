<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Open Sans', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="320" fill="#f6fdf5" rx="10"/>

  <!-- ── Title ──────────────────────────────────────── -->
  <text x="450" y="30" text-anchor="middle" font-size="14" fill="#1a4e66" font-weight="bold">Builder-based Dependency Injection</text>

  <!-- ══ Rule Dictionary / Name Map ════════════════════ -->
  <text x="52" y="62" font-size="12" fill="#267499" font-weight="bold">Rule Dictionary</text>
  <rect x="18" y="70" width="194" height="230" rx="8" fill="white" stroke="#267499" stroke-width="1.5"/>

  <!-- Rule entries in dictionary -->
  <!-- iri -->
  <rect x="30" y="82" width="170" height="26" rx="5" fill="#dce8f0"/>
  <text x="42" y="100" font-size="12" fill="#1a4e66" font-weight="bold">iri</text>
  <text x="120" y="100" text-anchor="middle" font-size="10" fill="#267499">→ iriFull | prefixedName</text>

  <!-- iriFull -->
  <rect x="30" y="116" width="170" height="26" rx="5" fill="#f0f4f8"/>
  <text x="42" y="134" font-size="12" fill="#1a4e66">iriFull</text>
  <text x="180" y="134" text-anchor="end" font-size="10" fill="#267499">  &lt;…&gt;</text>

  <!-- prefixedName — patched! -->
  <rect x="30" y="150" width="170" height="26" rx="5" fill="#fff0e0" stroke="#e26c22" stroke-width="1.5"/>
  <text x="42" y="168" font-size="12" fill="#1a4e66">prefixedName</text>
  <text x="195" y="168" text-anchor="end" font-size="10" fill="#e26c22" font-weight="bold">~patched</text>

  <!-- literal -->
  <rect x="30" y="184" width="170" height="26" rx="5" fill="#f0f4f8"/>
  <text x="42" y="202" font-size="12" fill="#1a4e66">literal</text>
  <text x="180" y="202" text-anchor="end" font-size="10" fill="#267499">"…"</text>

  <!-- triplePattern — added! -->
  <rect x="30" y="218" width="170" height="26" rx="5" fill="#e8f7ee" stroke="#2a9d5c" stroke-width="1.5"/>
  <text x="42" y="236" font-size="12" fill="#1a4e66">triplePattern</text>
  <text x="195" y="236" text-anchor="end" font-size="10" fill="#2a9d5c" font-weight="bold">+added</text>

  <!-- selectQuery -->
  <rect x="30" y="252" width="170" height="26" rx="5" fill="#f0f4f8"/>
  <text x="42" y="270" font-size="12" fill="#1a4e66">selectQuery</text>
  <text x="180" y="270" text-anchor="end" font-size="10" fill="#267499">SELECT…</text>

  <!-- ══ Builder Operations ════════════════════════════ -->
  <text x="250" y="62" font-size="12" fill="#267499" font-weight="bold">Builder Operations</text>
  <!-- add -->
  <rect x="242" y="70" width="180" height="60" rx="8" fill="#e8f7ee" stroke="#2a9d5c" stroke-width="2"/>
  <text x="264" y="93" font-size="22" fill="#2a9d5c" font-weight="bold">+</text>
  <text x="288" y="93" font-size="13" fill="#1a4e66" font-weight="bold">.addRule(…)</text>
  <text x="264" y="112" font-size="11" fill="#2a9d5c">Register a new rule module</text>
  <!-- patch -->
  <rect x="242" y="142" width="180" height="60" rx="8" fill="#fff0e0" stroke="#e26c22" stroke-width="2"/>
  <text x="264" y="165" font-size="22" fill="#e26c22" font-weight="bold">~</text>
  <text x="288" y="165" font-size="13" fill="#1a4e66" font-weight="bold">.patchRule(…)</text>
  <text x="264" y="184" font-size="11" fill="#e26c22">Replace a rule's behavior</text>
  <!-- remove -->
  <rect x="242" y="214" width="180" height="60" rx="8" fill="#fde8e8" stroke="#cc3333" stroke-width="2"/>
  <text x="264" y="237" font-size="22" fill="#cc3333" font-weight="bold">−</text>
  <text x="288" y="237" font-size="13" fill="#1a4e66" font-weight="bold">.removeRule(…)</text>
  <text x="264" y="256" font-size="11" fill="#cc3333">Drop a rule (restrict language)</text>

  <!-- Arrow: operations → dictionary -->
  <path d="M 242 200 Q 220 200 212 200" stroke="#1a4e66" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 Z" fill="#1a4e66"/>
    </marker>
  </defs>

  <!-- ══ Example Code ══════════════════════════════════ -->
  <text x="462" y="62" font-size="12" fill="#267499" font-weight="bold">TypeScript Example</text>
  <rect x="454" y="70" width="428" height="140" rx="8" fill="#1a4e66"/>
  <!-- Code lines -->
  <text x="472" y="94" font-size="11" fill="#7ec8e3" font-family="monospace">const</text>
  <text x="510" y="94" font-size="11" fill="white" font-family="monospace">base = GeneratorBuilder</text>
  <text x="472" y="112" font-size="11" fill="white" font-family="monospace">  .create([iriFull, prefixedIri])</text>
  <text x="472" y="130" font-size="11" fill="white" font-family="monospace">  .addRule(iri)</text>
  <text x="472" y="148" font-size="11" fill="#7ec8e3" font-family="monospace">  // Base IRI generator</text>
  <text x="472" y="172" font-size="11" fill="#7ec8e3" font-family="monospace">const</text>
  <text x="510" y="172" font-size="11" fill="white" font-family="monospace">custom = GeneratorBuilder</text>
  <text x="472" y="190" font-size="11" fill="white" font-family="monospace">  .create(base)</text>
  <text x="472" y="206" font-size="11" fill="#ffa07a" font-family="monospace">  .patchRule(altPrefixedRule)</text>

  <!-- ══ Dependency graph ══════════════════════════════ -->
  <text x="462" y="234" font-size="12" fill="#267499" font-weight="bold">Dependency Graph</text>
  <!-- iri node -->
  <rect x="454" y="244" width="54" height="28" rx="6" fill="#dce8f0" stroke="#1a4e66" stroke-width="1.5"/>
  <text x="481" y="263" text-anchor="middle" font-size="12" fill="#1a4e66" font-weight="bold">iri</text>
  <!-- iriFull node -->
  <rect x="560" y="226" width="64" height="28" rx="6" fill="#dce8f0" stroke="#1a4e66" stroke-width="1"/>
  <text x="592" y="245" text-anchor="middle" font-size="11" fill="#1a4e66">iriFull</text>
  <!-- prefixedName node (patched) -->
  <rect x="560" y="262" width="90" height="28" rx="6" fill="#fff0e0" stroke="#e26c22" stroke-width="1.5"/>
  <text x="605" y="281" text-anchor="middle" font-size="11" fill="#e26c22">prefixedName ~</text>
  <!-- Arrows from iri to subrules -->
  <line x1="508" y1="255" x2="556" y2="240" stroke="#267499" stroke-width="1.2"/>
  <polygon points="552,237 560,240 553,244" fill="#267499"/>
  <line x1="508" y1="263" x2="556" y2="271" stroke="#267499" stroke-width="1.2"/>
  <polygon points="552,268 560,271 553,275" fill="#267499"/>
  <!-- altPrefixedRule patches prefixedName -->
  <rect x="692" y="262" width="110" height="28" rx="6" fill="#fff0e0" stroke="#e26c22" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="747" y="281" text-anchor="middle" font-size="11" fill="#e26c22">altPrefixedRule</text>
  <line x1="650" y1="276" x2="688" y2="276" stroke="#e26c22" stroke-width="1.5"/>
  <polygon points="684,272 692,276 684,280" fill="#e26c22"/>
  <text x="668" y="270" text-anchor="middle" font-size="9" fill="#e26c22">patches</text>

  <!-- Build arrow -->
  <rect x="454" y="298" width="428" height="14" rx="4" fill="#267499" opacity="0.15"/>
  <text x="668" y="309" text-anchor="middle" font-size="11" fill="#1a4e66" font-weight="bold">.build()  →  assembled parser / generator / transformer</text>
</svg>
